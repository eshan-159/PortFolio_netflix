<svg width="960" height="540" viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Skills Matrix Preview</title>
  <desc id="desc">Stylised representation of the Netflix-inspired skills grid divided into categories.</desc>
  <defs>
    <linearGradient id="skills-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080808" />
      <stop offset="100%" stop-color="#111111" />
    </linearGradient>
    <filter id="card-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="rgba(0,0,0,0.55)" />
    </filter>
  </defs>
  <rect width="960" height="540" fill="url(#skills-bg)" rx="24" />
  <text x="70" y="100" fill="#ffffff" font-size="46" font-weight="700" font-family="'Netflix Sans','Segoe UI',sans-serif">Skills Matrix</text>
  <line x1="70" y1="120" x2="300" y2="120" stroke="#e50914" stroke-width="6" stroke-linecap="round" />
  <g transform="translate(60 150)" font-family="'Netflix Sans','Segoe UI',sans-serif" fill="#ffffff">
    <text x="0" y="40" font-size="22" font-weight="600">Programming Languages</text>
    <g transform="translate(0 60)" fill="#ffffff" font-size="18">
      <g filter="url(#card-shadow)">
        <rect x="0" y="0" width="190" height="110" rx="16" fill="rgba(26,26,26,0.9)" stroke="rgba(229,9,20,0.35)" stroke-width="2" />
        <text x="28" y="52">Java</text>
        <text x="28" y="82" fill="#ff4d5a">OOP core strengths</text>
      </g>
      <g filter="url(#card-shadow)" transform="translate(210 0)">
        <rect x="0" y="0" width="190" height="110" rx="16" fill="rgba(26,26,26,0.9)" stroke="rgba(229,9,20,0.35)" stroke-width="2" />
        <text x="28" y="52">C++</text>
        <text x="28" y="82" fill="#ff4d5a">High-performance apps</text>
      </g>
      <g filter="url(#card-shadow)" transform="translate(420 0)">
        <rect x="0" y="0" width="190" height="110" rx="16" fill="rgba(26,26,26,0.9)" stroke="rgba(229,9,20,0.35)" stroke-width="2" />
        <text x="28" y="52">Python</text>
        <text x="28" y="82" fill="#ff4d5a">AI + automation</text>
      </g>
      <g filter="url(#card-shadow)" transform="translate(630 0)">
        <rect x="0" y="0" width="190" height="110" rx="16" fill="rgba(26,26,26,0.9)" stroke="rgba(229,9,20,0.35)" stroke-width="2" />
        <text x="28" y="52">TypeScript</text>
        <text x="28" y="82" fill="#ff4d5a">Typed React stacks</text>
      </g>
    </g>
    <text x="0" y="250" font-size="22" font-weight="600">Frontend Systems</text>
    <g transform="translate(0 270)" fill="#ffffff" font-size="18">
      <g filter="url(#card-shadow)">
        <rect x="0" y="0" width="190" height="110" rx="16" fill="rgba(26,26,26,0.9)" stroke="rgba(229,9,20,0.35)" stroke-width="2" />
        <text x="28" y="52">React</text>
        <text x="28" y="82" fill="#ff4d5a">Reusable UI patterns</text>
      </g>
      <g filter="url(#card-shadow)" transform="translate(210 0)">
        <rect x="0" y="0" width="190" height="110" rx="16" fill="rgba(26,26,26,0.9)" stroke="rgba(229,9,20,0.35)" stroke-width="2" />
        <text x="28" y="52">Next.js</text>
        <text x="28" y="82" fill="#ff4d5a">SSR + edge delivery</text>
      </g>
      <g filter="url(#card-shadow)" transform="translate(420 0)">
        <rect x="0" y="0" width="190" height="110" rx="16" fill="rgba(26,26,26,0.9)" stroke="rgba(229,9,20,0.35)" stroke-width="2" />
        <text x="28" y="52">Tailwind</text>
        <text x="28" y="82" fill="#ff4d5a">Design systems</text>
      </g>
      <g filter="url(#card-shadow)" transform="translate(630 0)">
        <rect x="0" y="0" width="190" height="110" rx="16" fill="rgba(26,26,26,0.9)" stroke="rgba(229,9,20,0.35)" stroke-width="2" />
        <text x="28" y="52">WebGL</text>
        <text x="28" y="82" fill="#ff4d5a">Immersive visuals</text>
      </g>
    </g>
  </g>
</svg>
