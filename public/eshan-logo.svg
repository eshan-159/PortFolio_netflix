<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" width="240" height="80" preserveAspectRatio="xMidYMid meet" role="img" aria-label="ESHAN brand logo">
  <defs>
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e50914;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f40612;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e50914;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Bold letter E -->
  <path d="M 20 20 L 20 60 L 50 60 L 50 54 L 28 54 L 28 43 L 48 43 L 48 37 L 28 37 L 28 26 L 50 26 L 50 20 Z" 
        fill="url(#redGradient)" filter="url(#glow)"/>
  
  <!-- Bold letter S -->
  <path d="M 60 27 Q 60 20 68 20 Q 76 20 76 27 L 76 30 L 84 30 L 84 26 Q 84 15 68 15 Q 52 15 52 27 Q 52 34 58 37 L 76 44 Q 80 46 80 50 Q 80 54 76 56 Q 72 58 68 56 Q 64 54 64 50 L 64 47 L 56 47 L 56 51 Q 56 65 68 65 Q 80 65 88 56 Q 88 46 82 42 L 64 35 Q 60 33 60 29 Z" 
        fill="url(#redGradient)" filter="url(#glow)"/>
  
  <!-- Bold letter H -->
  <path d="M 98 20 L 98 60 L 106 60 L 106 43 L 122 43 L 122 60 L 130 60 L 130 20 L 122 20 L 122 37 L 106 37 L 106 20 Z" 
        fill="url(#redGradient)" filter="url(#glow)"/>
  
  <!-- Bold letter A -->
  <path d="M 140 20 L 132 60 L 140 60 L 141 54 L 155 54 L 156 60 L 164 60 L 156 20 Z M 143 48 L 148 26 L 153 48 Z" 
        fill="url(#redGradient)" filter="url(#glow)"/>
  
  <!-- Bold letter N -->
  <path d="M 174 20 L 174 60 L 181 60 L 181 32 L 197 60 L 204 60 L 204 20 L 197 20 L 197 48 L 181 20 Z" 
        fill="url(#redGradient)" filter="url(#glow)"/>
  
  <!-- Subtle underline accent -->
  <rect x="20" y="65" width="184" height="2" fill="url(#redGradient)" opacity="0.6"/>
</svg>
